<div class="flex items-center p-4">
  <div class="bg-black text-white px-2 py-1 font-bold">P</div>
  <div class="bg-gray-200 px-2 py-1 font-bold ml-1">B</div>
  <span class="ml-2 font-bold text-lg">ProfileBook</span>
</div>

<div class="auth-page">
  <div class="auth-card">
    <p class="auth-eyebrow">Account recovery</p>
    <h2 class="auth-title">Reset password</h2>
    <p class="auth-subtitle">Enter the reset code and choose a new password.</p>

    <input
      type="email"
      placeholder="Email"
      [(ngModel)]="form.email"
      class="auth-input">

    <input
      type="text"
      placeholder="Reset code"
      [(ngModel)]="form.token"
      class="auth-input token-input">

    <div class="password-row">
      <input
        [type]="showNewPassword ? 'text' : 'password'"
        placeholder="New password"
        [(ngModel)]="form.newPassword"
        class="auth-input password-input">

      <button type="button" class="toggle-button" (click)="showNewPassword = !showNewPassword">
        {{ showNewPassword ? 'Hide' : 'Show' }}
      </button>
    </div>

    <div class="password-row">
      <input
        [type]="showConfirmPassword ? 'text' : 'password'"
        placeholder="Confirm password"
        [(ngModel)]="form.confirmPassword"
        class="auth-input password-input">

      <button type="button" class="toggle-button" (click)="showConfirmPassword = !showConfirmPassword">
        {{ showConfirmPassword ? 'Hide' : 'Show' }}
      </button>
    </div>

    <div class="rules-card">
      <p [class.rule-ok]="hasLength()">At least 8 characters</p>
      <p [class.rule-ok]="hasUppercase()">At least 1 uppercase letter</p>
      <p [class.rule-ok]="hasSpecial()">At least 1 special character</p>
      <p [class.rule-ok]="passwordsMatch()">Passwords match</p>
    </div>

    <button
      type="button"
      class="auth-button"
      [disabled]="isSubmitting"
      (click)="resetPassword()">
      {{ isSubmitting ? 'Resetting password...' : 'Reset Password' }}
    </button>

    <p class="auth-footer">
      Need a fresh code?
      <a routerLink="/forgot-password" class="auth-link">Generate again</a>
    </p>
  </div>
</div>
