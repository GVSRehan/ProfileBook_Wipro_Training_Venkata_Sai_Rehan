<div class="flex items-center p-4">
  <div class="bg-black text-white px-2 py-1 font-bold">P</div>
  <div class="bg-gray-200 px-2 py-1 font-bold ml-1">B</div>
  <span class="ml-2 font-bold text-lg">ProfileBook</span>
</div>

<div class="auth-page">
  <div class="auth-card">
    <p class="auth-eyebrow">Account recovery</p>
    <h2 class="auth-title">Forgot password</h2>
    <p class="auth-subtitle">Enter your email to generate a short-lived reset code.</p>

    <input
      type="email"
      placeholder="Email"
      [(ngModel)]="form.email"
      class="auth-input">

    <button
      type="button"
      class="auth-button"
      [disabled]="isSubmitting"
      (click)="requestResetCode()">
      {{ isSubmitting ? 'Generating code...' : 'Generate Reset Code' }}
    </button>

    @if (resetToken) {
      <div class="token-card">
        <p class="token-title">Testing reset code</p>
        <p class="token-value">{{ resetToken }}</p>
        <p class="token-meta">Use this code before {{ expiresAt | date:'medium' }}.</p>

        <button type="button" class="secondary-button" (click)="continueToReset()">
          Continue to Reset Password
        </button>
      </div>
    }

    <p class="auth-footer">
      Remembered your password?
      <a routerLink="/login" class="auth-link">Back to login</a>
    </p>
  </div>
</div>
